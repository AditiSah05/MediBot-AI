<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f7f7f8;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #1a1a1a;
        }

        /* Top bar */
        .topbar {
            height: 56px;
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 10px;
            flex-shrink: 0;
        }

        .topbar-logo {
            width: 32px;
            height: 32px;
            background: #18181b;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 15px;
        }

        .topbar-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #18181b;
        }

        .topbar-badge {
            font-size: 0.7rem;
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
            border-radius: 20px;
            padding: 2px 8px;
            font-weight: 500;
        }

        .topbar-actions {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .topbar-btn {
            background: none;
            border: 1px solid #e5e5e5;
            border-radius: 7px;
            padding: 5px 12px;
            font-size: 0.8rem;
            color: #6b7280;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.15s;
            font-family: 'Inter', sans-serif;
        }

        .topbar-btn:hover {
            background: #f4f4f5;
            color: #18181b;
            border-color: #d1d5db;
        }

        /* Emergency strip */
        .emergency-strip {
            background: #fff7ed;
            border-bottom: 1px solid #fed7aa;
            padding: 7px 20px;
            font-size: 0.78rem;
            color: #9a3412;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        /* Chat area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
        }

        .chat-area::-webkit-scrollbar { width: 5px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }

        /* Empty state */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .empty-icon {
            width: 52px;
            height: 52px;
            background: #18181b;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            margin-bottom: 16px;
        }

        .empty-state h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #18181b;
            margin-bottom: 6px;
        }

        .empty-state p {
            font-size: 0.88rem;
            color: #6b7280;
            max-width: 340px;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-width: 520px;
        }

        .chip {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 20px;
            padding: 7px 14px;
            font-size: 0.82rem;
            color: #374151;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Inter', sans-serif;
        }

        .chip:hover {
            background: #18181b;
            color: #fff;
            border-color: #18181b;
        }

        /* Messages */
        .message-row {
            padding: 4px 0;
            display: flex;
            flex-direction: column;
        }

        .message-row.user {
            align-items: flex-end;
            padding-right: 20px;
            padding-left: 80px;
        }

        .message-row.bot {
            align-items: flex-start;
            padding-left: 20px;
            padding-right: 80px;
        }

        .bubble {
            max-width: 680px;
            padding: 11px 16px;
            border-radius: 14px;
            font-size: 0.9rem;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message-row.user .bubble {
            background: #18181b;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message-row.bot .bubble {
            background: #fff;
            color: #1a1a1a;
            border: 1px solid #e5e5e5;
            border-bottom-left-radius: 4px;
        }

        .bubble strong { color: inherit; font-weight: 600; }
        .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
        .bubble li { margin-bottom: 3px; }

        .msg-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
            padding: 0 2px;
        }

        .msg-time {
            font-size: 0.7rem;
            color: #9ca3af;
        }

        .msg-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .message-row:hover .msg-actions { opacity: 1; }

        .msg-action-btn {
            background: none;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            padding: 2px 7px;
            font-size: 0.7rem;
            color: #9ca3af;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 3px;
            transition: all 0.15s;
            font-family: 'Inter', sans-serif;
        }

        .msg-action-btn:hover { background: #f4f4f5; color: #374151; border-color: #d1d5db; }
        .msg-action-btn.copied { color: #16a34a; border-color: #bbf7d0; }
        .msg-action-btn.liked { color: #16a34a; border-color: #bbf7d0; background: #f0fdf4; }
        .msg-action-btn.disliked { color: #dc2626; border-color: #fecaca; background: #fef2f2; }

        /* Typing indicator */
        .typing-row {
            display: none;
            padding: 4px 20px;
        }

        .typing-bubble {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 14px;
            border-bottom-left-radius: 4px;
            padding: 12px 16px;
            display: inline-flex;
            gap: 4px;
            align-items: center;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: #9ca3af;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* Input area */
        .input-area {
            background: #fff;
            border-top: 1px solid #e5e5e5;
            padding: 14px 20px 16px;
            flex-shrink: 0;
        }

        .input-box {
            max-width: 760px;
            margin: 0 auto;
            background: #f7f7f8;
            border: 1px solid #e5e5e5;
            border-radius: 14px;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .input-box:focus-within {
            border-color: #18181b;
            box-shadow: 0 0 0 3px rgba(24,24,27,0.06);
            background: #fff;
        }

        textarea.msg-input {
            width: 100%;
            background: none;
            border: none;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: #1a1a1a;
            resize: none;
            min-height: 24px;
            max-height: 120px;
            line-height: 1.5;
        }

        textarea.msg-input::placeholder { color: #9ca3af; }

        .input-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .char-count {
            font-size: 0.72rem;
            color: #9ca3af;
            transition: color 0.15s;
        }

        .char-count.warn { color: #d97706; }
        .char-count.limit { color: #dc2626; font-weight: 600; }

        .send-btn {
            width: 32px;
            height: 32px;
            background: #18181b;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) { background: #374151; }
        .send-btn:disabled { background: #d1d5db; cursor: not-allowed; }

        /* Scroll to top */
        #scrollTopBtn {
            position: fixed;
            bottom: 90px;
            right: 24px;
            width: 36px;
            height: 36px;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 50%;
            color: #6b7280;
            font-size: 14px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.15s;
            z-index: 99;
        }

        #scrollTopBtn:hover { background: #f4f4f5; color: #18181b; }
        #scrollTopBtn.visible { display: flex; }

        /* Fade in */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message-row { animation: fadeUp 0.2s ease; }

        @media (max-width: 640px) {
            .message-row.user { padding-left: 20px; }
            .message-row.bot  { padding-right: 20px; }
            .bubble { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <!-- Top bar -->
    <div class="topbar">
        <div class="topbar-logo"><i class="fas fa-stethoscope"></i></div>
        <span class="topbar-title">MediBot</span>
        <span class="topbar-badge">Online</span>
        <div class="topbar-actions">
            <button class="topbar-btn" id="clearChatBtn">
                <i class="fas fa-rotate-left"></i> New chat
            </button>
        </div>
    </div>

    <!-- Emergency strip -->
    <div class="emergency-strip">
        <i class="fas fa-triangle-exclamation"></i>
        For emergencies call <strong>911</strong>. MediBot provides general information only — not medical advice.
    </div>

    <!-- Chat area -->
    <div class="chat-area" id="chatArea">

        <!-- Empty / welcome state -->
        <div class="empty-state" id="emptyState">
            <div class="empty-icon"><i class="fas fa-stethoscope"></i></div>
            <h2>How can I help you today?</h2>
            <p>Ask about symptoms, conditions, medications, or general health guidance.</p>
            <div class="chips">
                <button class="chip" onclick="sendSuggestion('What is diabetes?')">What is diabetes?</button>
                <button class="chip" onclick="sendSuggestion('Heart attack symptoms')">Heart attack symptoms</button>
                <button class="chip" onclick="sendSuggestion('How to manage anxiety')">How to manage anxiety</button>
                <button class="chip" onclick="sendSuggestion('Vaccination schedule for adults')">Vaccination schedule</button>
                <button class="chip" onclick="sendSuggestion('High blood pressure tips')">High blood pressure</button>
                <button class="chip" onclick="sendSuggestion('When to go to the ER')">When to go to the ER</button>
                <button class="chip" onclick="sendSuggestion('Healthy lifestyle tips')">Healthy lifestyle</button>
                <button class="chip" onclick="sendSuggestion('What is asthma?')">What is asthma?</button>
            </div>
        </div>

        <!-- Typing indicator -->
        <div class="typing-row" id="typingRow">
            <div class="typing-bubble">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>

    </div>

    <!-- Input area -->
    <div class="input-area">
        <form id="msgForm">
            <div class="input-box">
                <textarea class="msg-input" id="msgInput" placeholder="Message MediBot..." rows="1" maxlength="500"></textarea>
                <div class="input-footer">
                    <span class="char-count" id="charCount">0 / 500</span>
                    <button type="submit" class="send-btn" id="sendBtn">
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>
            </div>
        </form>
    </div>

    <button id="scrollTopBtn" title="Scroll to top" aria-label="Scroll to top">
        <i class="fas fa-chevron-up"></i>
    </button>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script>
        $(function () {
            const chatArea  = $('#chatArea');
            const emptyState = $('#emptyState');
            const typingRow = $('#typingRow');
            const msgInput  = $('#msgInput');
            const sendBtn   = $('#sendBtn');
            const charCount = $('#charCount');

            // Load history
            $.get('/history', function (history) {
                if (history.length) {
                    emptyState.hide();
                    history.forEach(e => addMessage(e.text, e.role === 'user' ? 'user' : 'bot', '', true));
                    scrollBottom();
                }
            });

            // Clear chat
            $('#clearChatBtn').on('click', function () {
                $.post('/clear', function () {
                    chatArea.find('.message-row').remove();
                    emptyState.show();
                });
            });

            // Textarea auto-resize + counter
            msgInput.on('input', function () {
                this.style.height = 'auto';
                this.style.height = this.scrollHeight + 'px';
                const len = this.value.length;
                charCount.text(len + ' / 500').removeClass('warn limit');
                if (len >= 500) charCount.addClass('limit');
                else if (len >= 400) charCount.addClass('warn');
            });

            // Enter to send
            msgInput.on('keydown', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    $('#msgForm').submit();
                }
            });

            // Submit
            $('#msgForm').on('submit', function (e) {
                e.preventDefault();
                const msg = msgInput.val().trim();
                if (!msg) return;
                sendMessage(msg);
            });

            function sendMessage(msg) {
                emptyState.hide();
                addMessage(msg, 'user', getCurrentTime());
                msgInput.val('').css('height', 'auto');
                charCount.text('0 / 500').removeClass('warn limit');
                sendBtn.prop('disabled', true);
                typingRow.show();
                scrollBottom();

                $.ajax({
                    url: '/get', method: 'POST', data: { msg },
                    success: function (res) {
                        typingRow.hide();
                        addMessage(res, 'bot', getCurrentTime());
                        sendBtn.prop('disabled', false);
                        msgInput.focus();
                    },
                    error: function () {
                        typingRow.hide();
                        addMessage('Something went wrong. Please try again.', 'bot', getCurrentTime());
                        sendBtn.prop('disabled', false);
                    }
                });
            }

            function addMessage(content, sender, time, silent) {
                const timeHtml = time ? `<span class="msg-time">${time}</span>` : '';
                const actions = sender === 'bot' ? `
                    <div class="msg-actions">
                        <button class="msg-action-btn copy-btn"><i class="fas fa-copy"></i> Copy</button>
                        <button class="msg-action-btn feedback-btn" data-v="up"><i class="fas fa-thumbs-up"></i></button>
                        <button class="msg-action-btn feedback-btn" data-v="down"><i class="fas fa-thumbs-down"></i></button>
                    </div>` : '';

                const row = $(`
                    <div class="message-row ${sender}" ${silent ? 'style="animation:none"' : ''}>
                        <div class="bubble">${formatMsg(content)}</div>
                        <div class="msg-meta">${timeHtml}${actions}</div>
                    </div>
                `);

                typingRow.before(row);
                if (!silent) scrollBottom();
            }

            function formatMsg(text) {
                text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                text = text.replace(/^[•\-] /gm, '<li>');
                text = text.replace(/\n/g, '<br>');
                if (text.includes('<li>')) {
                    text = text.replace(/(<li>[^<]*(<br>)?)+/g, m => '<ul>' + m.replace(/<br>/g, '</li>') + '</ul>');
                }
                return text;
            }

            function scrollBottom() {
                chatArea.scrollTop(chatArea[0].scrollHeight);
            }

            function getCurrentTime() {
                return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }

            // Copy
            chatArea.on('click', '.copy-btn', function () {
                const btn = $(this);
                const text = btn.closest('.message-row').find('.bubble').clone()
                    .find('strong').each(function(){ $(this).replaceWith($(this).text()); }).end()
                    .text().trim();
                navigator.clipboard.writeText(text).then(() => {
                    btn.addClass('copied').html('<i class="fas fa-check"></i> Copied');
                    setTimeout(() => btn.removeClass('copied').html('<i class="fas fa-copy"></i> Copy'), 2000);
                });
            });

            // Feedback
            chatArea.on('click', '.feedback-btn', function () {
                const btn = $(this);
                const group = btn.closest('.msg-actions').find('.feedback-btn');
                group.removeClass('liked disliked').prop('disabled', true);
                btn.addClass(btn.data('v') === 'up' ? 'liked' : 'disliked');
            });

            // Scroll to top btn
            const scrollTopBtn = $('#scrollTopBtn');
            chatArea.on('scroll', function () {
                scrollTopBtn.toggleClass('visible', chatArea.scrollTop() > 200);
            });
            scrollTopBtn.on('click', () => chatArea.animate({ scrollTop: 0 }, 350));

            msgInput.focus();
        });

        function sendSuggestion(msg) {
            $('#msgInput').val(msg).trigger('input');
            $('#msgForm').submit();
        }
    </script>
</body>
</html>
