<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — MediBot</title>
    <meta name="theme-color" content="#ffffff">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f7f7f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .icon {
            width: 64px; height: 64px;
            background: #f4f4f5; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: #9ca3af;
            margin: 0 auto 24px;
            animation: fadeUp 0.4s ease both;
        }
        h1 {
            font-size: 1.4rem; font-weight: 700; color: #18181b;
            margin-bottom: 8px;
            animation: fadeUp 0.4s ease 0.1s both;
        }
        p {
            font-size: 0.9rem; color: #6b7280; margin-bottom: 28px;
            animation: fadeUp 0.4s ease 0.2s both;
        }
        .actions { display: flex; gap: 10px; justify-content: center; animation: fadeUp 0.4s ease 0.3s both; }
        a.btn {
            background: #18181b; color: white; border-radius: 10px;
            padding: 10px 22px; font-size: 0.88rem; font-weight: 500;
            text-decoration: none; display: inline-flex; align-items: center; gap: 7px;
            transition: background 0.15s, transform 0.15s;
        }
        a.btn:hover { background: #374151; transform: translateY(-2px); }
        a.btn.secondary {
            background: #fff; color: #374151;
            border: 1px solid #e5e5e5;
        }
        a.btn.secondary:hover { background: #f4f4f5; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
    <div class="icon"><i class="fas fa-stethoscope"></i></div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <div class="actions">
        <a href="/" class="btn"><i class="fas fa-house"></i> Go home</a>
        <a href="/chat" class="btn secondary"><i class="fas fa-comment-medical"></i> Open chat</a>
    </div>
</body>
</html>
